<!DOCTYPE html>
<html>
<head>
    <title>Greeting Callback</title>
</head>

<body>

    <h1 id="output"></h1>

    <script>

        function greet(name) {

            document.getElementById("output")
                .innerHTML =
                "Hello " + name;

        }

        function processUser(name, callback) {

            callback(name);

        }

        processUser("John", greet);

    </script>

</body>
</html>
