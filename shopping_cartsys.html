<!DOCTYPE html>
<html>
<head>
    <title>Shopping Cart</title>
</head>

<body>

    <h1>Shopping Cart</h1>

    <div id="output"></div>

    <script>

        let output =
            document.getElementById("output");

        function print(message) {

            output.innerHTML += message + "<br>";

        }

        class Product {

            constructor(name, price) {

                this.name = name;

                this.price = price;

            }

        }

        class Cart {

            constructor() {

                this.items = [];

                this.discount = 0;

            }

            addItem(product, quantity) {

                this.items.push({
                    product: product,
                    quantity: quantity
                });

                print(
                    quantity +
                    " " +
                    product.name +
                    "(s) added to cart"
                );

            }

            removeItem(productName) {

                this.items =
                    this.items.filter(
                        item =>
                        item.product.name !== productName
                    );

                print(
                    productName +
                    " removed from cart"
                );

            }

            applyCoupon(discountPercent) {

                this.discount = discountPercent;

                print(
                    "Coupon Applied: " +
                    discountPercent +
                    "% OFF"
                );

            }

            calculateTotal() {

                let total = 0;

                this.items.forEach(item => {

                    total +=
                        item.product.price *
                        item.quantity;

                });

                let discountAmount =
                    (total * this.discount) / 100;

                let finalTotal =
                    total - discountAmount;

                print(
                    "Total Price: ₹" + finalTotal
                );

            }

            showCart() {

                print("<b>Cart Items</b>");

                this.items.forEach(item => {

                    print(
                        item.product.name +
                        " - ₹" +
                        item.product.price +
                        " x " +
                        item.quantity
                    );

                });

            }

        }

        let p1 =
            new Product("Laptop", 50000);

        let p2 =
            new Product("Mobile", 20000);

        let p3 =
            new Product("Headphones", 3000);

        let cart = new Cart();

        cart.addItem(p1, 1);

        cart.addItem(p2, 2);

        cart.addItem(p3, 1);

        cart.showCart();

        cart.removeItem("Headphones");

        cart.applyCoupon(10);

        cart.calculateTotal();

    </script>

</body>
</html>
